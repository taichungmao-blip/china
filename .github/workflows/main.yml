name: CSI 300 Daily Tracker

on:
  schedule:
    # 這裡使用 UTC 時間。UTC 08:00 = 台灣時間 16:00 (每週一到週五)
    - cron: '0 8 * * 1-5'
  # 保留 workflow_dispatch，讓你可以隨時在 GitHub 網頁上手動點擊執行
  workflow_dispatch: 

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 安裝程式碼中需要用到的所有套件
        pip install yfinance pandas matplotlib requests deep-translator

    - name: Run CSI 300 Tracker
      env:
        # 從 GitHub Secrets 中讀取 webhook 網址
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        # 請確保這裡的檔名與你剛剛存的 Python 檔名完全一致
        python csi300_tracker_all.py
